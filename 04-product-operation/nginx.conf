# =============================================================================
# Nginx Config — ECP Food (food.ecportilho.com)
# =============================================================================
# Instalação:
#   sudo cp nginx.conf /etc/nginx/sites-available/foodflow
#   sudo ln -s /etc/nginx/sites-available/foodflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_payments:10m rate=10r/m;

# Upstream
upstream foodflow_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name food.ecportilho.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name food.ecportilho.com;

    # ---------------------------------------------------------------------------
    # SSL (Let's Encrypt / Certbot)
    # ---------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/food.ecportilho.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/food.ecportilho.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---------------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------------------------------------------------------------------------
    # Gzip Compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------------------------
    # Logs
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/foodflow-access.log;
    error_log /var/log/nginx/foodflow-error.log warn;

    # ---------------------------------------------------------------------------
    # API — Proxy para Node.js/Fastify
    # ---------------------------------------------------------------------------

    # Auth routes — rate limit mais restritivo
    location ~ ^/api/auth/(login|register) {
        limit_req zone=api_auth burst=5 nodelay;

        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Payment routes — rate limit específico
    location /api/payments/ {
        limit_req zone=api_payments burst=3 nodelay;

        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SSE — Server-Sent Events (payments/:id/events)
    location ~ ^/api/payments/.+/events$ {
        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE-specific: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding off;
    }

    # Webhook — sem rate limit (chamado pelo ecp-digital-bank)
    location /api/webhooks/ {
        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # General API routes
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---------------------------------------------------------------------------
    # Static Assets — Servidos diretamente pelo Nginx (Vite build)
    # ---------------------------------------------------------------------------
    location /assets/ {
        alias /opt/foodflow/client/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # SPA Fallback — React Router
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://foodflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---------------------------------------------------------------------------
    # Deny hidden files
    # ---------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------------------------------------------------------------------------
    # Favicon
    # ---------------------------------------------------------------------------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # ---------------------------------------------------------------------------
    # Max upload size (para futuras imagens de cardápio)
    # ---------------------------------------------------------------------------
    client_max_body_size 10M;
}
